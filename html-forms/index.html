<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Forms</title>
  </head>
  <body>
    <form>
      <h1>Coding Form!</h1>
      <fieldset>
        <legend>User Information</legend>
        <label for="username">Username:</label>
        <div>
          <input type="text" id="username" name="username" required />
        </div>
        <label for="email">Email:</label>
        <div>
          <input type="email" id="email" name="email" required />
        </div>
        <label for="password">Password:</label>
        <div>
          <input type="password" id="password" name="password" required />
        </div>
      </fieldset>

      <fieldset>
        <legend>Coding Preferences</legend>
        <label for="why-coding">Why is coding cool?</label>
        <div>
          <select id="why-coding" name="why-coding">
            <option value="">Select an option</option>
            <option value="interesting">Because it's interesting</option>
            <option value="fun">Because it's fun</option>
            <option value="powerful">Because it's powerful</option>
          </select>
        </div>
        <p>Favorite Language (choose one)</p>
        <label for="html"
          ><input type="radio" name="fav-language" value="html" />HTML</label
        >
        <label for="css"
          ><input type="radio" name="fav-language" value="css" />CSS</label
        >
        <label for="typescript"
          ><input
            type="radio"
            name="fav-language"
            value="typescript" />TypeScript</label
        >
      </fieldset>
      <fieldset>
        <legend>Follow-Up</legend>
        <p>Would you like to sign up for more information?</p>
        <label for="registry"
          ><input
            type="checkbox"
            id="registry"
            name="registry"
            value="register" />Sign me up!</label
        >
        <div>
          <label for="comments">Comments</label>
        </div>
        <div>
          <textarea
            id="comments"
            name="comments"
            rows="12"
            cols="54"></textarea>
        </div>
        <button type="submit">Submit</button>
      </fieldset>
    </form>
  </body>
</html>
