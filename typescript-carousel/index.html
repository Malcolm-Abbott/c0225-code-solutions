<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TypeScript Carousel</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="carousel">
        <div class="carousel-item main-row">
          <i class="fa-solid fa-chevron-left main-row-icon"></i>
          <img
            src="/typescript-carousel/images/001.png"
            alt="Image 1"
            class="main-row-image" />
          <i class="fa-solid fa-chevron-right main-row-icon"></i>
        </div>
        <div class="carousel-item icon-row">
          <i class="fa-solid fa-circle"></i>
          <i class="fa-regular fa-circle"></i>
          <i class="fa-regular fa-circle"></i>
          <i class="fa-regular fa-circle"></i>
          <i class="fa-regular fa-circle"></i>
        </div>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
